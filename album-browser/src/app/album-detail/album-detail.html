<h2>Album Detail</h2>

<ng-container *ngIf="album$ | async as album; else loading">

  <div class="card">
    <p><b>ID:</b> {{ album.id }}</p>
    <p><b>User:</b> {{ album.userId }}</p>
    <p><b>Title:</b> {{ album.title }}</p>

    <br>

    <a class="btn" [routerLink]="['/albums', album.id, 'photos']">
      View Photos
    </a>
  </div>

</ng-container>

<ng-template #loading>
  <p>Loading album...</p>
</ng-template>
