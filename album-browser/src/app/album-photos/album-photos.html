<h1>Album Photos</h1>

<div *ngIf="loading">Loading photos...</div>
<div *ngIf="!loading && errorMsg">{{ errorMsg }}</div>

<div *ngIf="!loading && !errorMsg && photos.length === 0">
  No photos found.
</div>

<div *ngIf="!loading && !errorMsg && photos.length > 0" class="grid">
  <div *ngFor="let photo of photos" class="card">
    <img [src]="photo.thumbnailUrl" [alt]="photo.title" />
    <p class="title">{{ photo.title }}</p>
  </div>
</div>

<br>
<a class="btn" [routerLink]="['/albums', albumId]">Back</a>
